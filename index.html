<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#FAFAF8"/>
  <title>CatFeed</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ══ AUTH ══════════════════════════════════════════ -->
<div id="s-auth" class="screen show">
  <div class="auth-wrap">
    <div class="auth-hero">
      <!-- Cat SVG -->
      <svg class="auth-cat" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="60" cy="68" rx="34" ry="26" fill="#E8E0D5"/>
        <path d="M34 52 Q28 32 38 28 Q42 44 46 50Z" fill="#E8E0D5"/>
        <path d="M86 52 Q92 32 82 28 Q78 44 74 50Z" fill="#E8E0D5"/>
        <path d="M36 30 Q38 26 42 28Z" fill="#C9B8A8"/>
        <path d="M84 30 Q82 26 78 28Z" fill="#C9B8A8"/>
        <ellipse cx="60" cy="54" rx="28" ry="24" fill="#EDE6DC"/>
        <ellipse cx="49" cy="50" rx="5" ry="7" fill="#2D2A26"/>
        <ellipse cx="71" cy="50" rx="5" ry="7" fill="#2D2A26"/>
        <ellipse cx="50" cy="49" rx="2" ry="3" fill="#fff"/>
        <ellipse cx="72" cy="49" rx="2" ry="3" fill="#fff"/>
        <ellipse cx="60" cy="58" rx="4" ry="3" fill="#E8A090"/>
        <path d="M57 60 Q60 63 63 60" stroke="#8B6F5E" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <line x1="60" y1="58" x2="60" y2="61" stroke="#8B6F5E" stroke-width="1"/>
        <line x1="38" y1="55" x2="28" y2="53" stroke="#8B6F5E" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="38" y1="58" x2="27" y2="58" stroke="#8B6F5E" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="38" y1="61" x2="28" y2="63" stroke="#8B6F5E" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="82" y1="55" x2="92" y2="53" stroke="#8B6F5E" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="82" y1="58" x2="93" y2="58" stroke="#8B6F5E" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="82" y1="61" x2="92" y2="63" stroke="#8B6F5E" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M46 86 Q60 94 74 86" stroke="#C9B8A8" stroke-width="8" stroke-linecap="round" fill="none"/>
      </svg>
      <h1 class="auth-title">CatFeed</h1>
      <p class="auth-sub">ניהול ארוחות לחתול המשפחה</p>
    </div>

    <div class="auth-tabs">
      <button class="atab active" id="t-login" onclick="switchTab('login')">כניסה</button>
      <button class="atab" id="t-reg" onclick="switchTab('reg')">הרשמה</button>
    </div>

    <div id="f-login" class="aform">
      <input class="inp" type="email" id="li-email" placeholder="אימייל" autocomplete="email"/>
      <input class="inp" type="password" id="li-pass" placeholder="סיסמה" autocomplete="current-password"/>
      <div id="li-err" class="err hide"></div>
      <button class="btn-main" onclick="doLogin()">כניסה</button>
    </div>
    <div id="f-reg" class="aform hide">
      <input class="inp" type="email" id="re-email" placeholder="אימייל" autocomplete="email"/>
      <input class="inp" type="password" id="re-pass" placeholder="סיסמה (6+ תווים)" autocomplete="new-password"/>
      <div id="re-err" class="err hide"></div>
      <button class="btn-main" onclick="doRegister()">הרשמה</button>
    </div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════ -->
<div id="s-app" class="screen hide">

  <!-- Top bar -->
  <header class="topbar">
    <div class="tb-left">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <ellipse cx="14" cy="16" rx="9" ry="8" fill="#C9B8A8"/>
        <path d="M7 13 Q5 7 8 6 Q10 11 11 13Z" fill="#C9B8A8"/>
        <path d="M21 13 Q23 7 20 6 Q18 11 17 13Z" fill="#C9B8A8"/>
        <ellipse cx="11" cy="14" rx="2.2" ry="3" fill="#2D2A26"/>
        <ellipse cx="17" cy="14" rx="2.2" ry="3" fill="#2D2A26"/>
        <ellipse cx="14" cy="17" rx="1.8" ry="1.4" fill="#E8A090"/>
      </svg>
      <span class="tb-name">החתול שלנו</span>
    </div>
    <div class="tb-right">
      <button class="icon-btn" onclick="showStats()" title="סטטיסטיקות">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="doLogout()" title="יציאה">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main">

    <!-- STATUS PILL -->
    <div class="status-pill" id="status-pill">
      <div class="sp-dot" id="sp-dot"></div>
      <span id="sp-text">טוען...</span>
    </div>

    <!-- MEAL CARDS -->
    <div class="meals">

      <!-- BREAKFAST -->
      <div class="meal-block" id="mb-breakfast">
        <div class="meal-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2.2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          ארוחת בוקר
        </div>

        <!-- Feedings list -->
        <div class="feedings-list" id="fl-breakfast"></div>

        <!-- Actions -->
        <div class="meal-actions">
          <button class="btn-feed" id="bf-now-breakfast" onclick="feedNow('breakfast')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            האכלתי עכשיו
          </button>
          <button class="btn-time" onclick="openPicker('breakfast')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            שעה אחרת
          </button>
        </div>
      </div>

      <!-- DINNER -->
      <div class="meal-block" id="mb-dinner">
        <div class="meal-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2.2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          ארוחת ערב
        </div>
        <div class="feedings-list" id="fl-dinner"></div>
        <div class="meal-actions">
          <button class="btn-feed" id="bf-now-dinner" onclick="feedNow('dinner')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            האכלתי עכשיו
          </button>
          <button class="btn-time" onclick="openPicker('dinner')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            שעה אחרת
          </button>
        </div>
      </div>
    </div>

    <!-- QUICK STATS -->
    <div class="qs-row">
      <div class="qs-box">
        <div class="qs-val" id="qs-streak">—</div>
        <div class="qs-lbl">ימים רצופים</div>
      </div>
      <div class="qs-box">
        <div class="qs-val" id="qs-bf">—</div>
        <div class="qs-lbl">ממוצע בוקר</div>
      </div>
      <div class="qs-box">
        <div class="qs-val" id="qs-di">—</div>
        <div class="qs-lbl">ממוצע ערב</div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="section-hdr">היסטוריה</div>
    <div id="history" class="history-list"></div>
    <div style="height:32px"></div>
  </main>
</div>

<!-- ══ STATS ══════════════════════════════════════════ -->
<div id="s-stats" class="screen hide">
  <header class="topbar">
    <div class="tb-left">
      <button class="icon-btn" onclick="showApp()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="tb-name">סטטיסטיקות</span>
    </div>
  </header>
  <main class="main">
    <div class="section-hdr">שעות האכלה — 14 ימים</div>
    <div class="chart-box"><canvas id="chart-times"></canvas></div>
    <div class="section-hdr">השלמה יומית</div>
    <div class="chart-box"><canvas id="chart-compl"></canvas></div>
    <div class="section-hdr">ממוצעים</div>
    <div class="avg-list">
      <div class="avg-row"><span>בוקר ממוצע</span><strong id="av-bf">—</strong></div>
      <div class="avg-row"><span>ערב ממוצע</span><strong id="av-di">—</strong></div>
      <div class="avg-row"><span>ימים עם 2 ארוחות</span><strong id="av-full">—</strong></div>
      <div class="avg-row"><span>שיא ימים רצופים</span><strong id="av-streak">—</strong></div>
    </div>
    <div style="height:32px"></div>
  </main>
</div>

<!-- ══ TIME PICKER SHEET ══════════════════════════════ -->
<div id="sheet-overlay" class="sheet-overlay hide" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">בחר שעה</div>
    <input type="time" id="time-inp" class="time-inp"/>
    <div class="sheet-actions">
      <button class="btn-main" onclick="confirmPicker()">אישור</button>
      <button class="btn-ghost" onclick="closeSheet()">ביטול</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hide"></div>

<script src="app.js"></script>
</body>
</html>
